name: full-bootstrap

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read

jobs:
  full-bootstrap:
    name: ${{ matrix.os }} full bootstrap
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_ENV_HINTS: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Cache Homebrew downloads (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-full-${{ runner.os }}-${{ hashFiles('Brewfile') }}
          restore-keys: |
            homebrew-full-${{ runner.os }}-

      - name: Cache Neovim bootstrap data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.local/share/nvim
            ~/.local/state/nvim
            ~/.cache/nvim
          key: nvim-bootstrap-${{ runner.os }}-${{ hashFiles('nvim/lazy-lock.json', 'nvim/**/*.lua', 'config/toolchain.sh') }}
          restore-keys: |
            nvim-bootstrap-${{ runner.os }}-

      - name: Cache npm and Cargo downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.npm
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: language-downloads-${{ runner.os }}-${{ hashFiles('nvim/lazy-lock.json', 'config/toolchain.sh') }}
          restore-keys: |
            language-downloads-${{ runner.os }}-

      - name: Full bootstrap smoke (Ubuntu)
        if: runner.os == 'Linux'
        run: bash ./scripts/ci-smoke-install.sh linux

      - name: Full bootstrap smoke (macOS)
        if: runner.os == 'macOS'
        run: bash ./scripts/ci-smoke-install.sh macos full
